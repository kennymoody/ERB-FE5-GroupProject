<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- style.css  -->
    <link rel="stylesheet" href="./css/style.css">

       <!-- script.js -->
    <link rel="preload" href="navbar.html" as="fetch" crossorigin />
    <link rel="preload" href="footer.html" as="fetch" crossorigin />
    <script src="./script/script.js"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
        integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">

    <!-- fontawesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"
        integrity="sha512-PgQMlq+nqFLV4ylk1gwUOgm6CtIIXkKwaIHp/PAIWHzig/lKZSEGKEysh0TCVbHJXCLN7WetD8TFecIky75ZfQ=="
        crossorigin="anonymous" />

    <title>E-Shop</title>
</head>

<body id="top" style=" background-color: #8EC5FC;
background-image: linear-gradient(62deg, #8EC5FC 0%, #E0C3FC 43%);">
    <!-- ==============header menu section starts here============== -->
     <div id="navbar-placeholder"></div>
    <!-- ==============header menu section ends here============== -->

    <!-- ==============store address starts here============== -->
    <section class="address_section py-5 my-5">
        <div class="container">
                 <div class="section_title text-center mb-5">
                <h1 class="text-uppercase text-decoration-none">Store Address</h1>
                      <div class="title-underline mx-auto"></div>
            </div>

    <!-- 地址主容器 (套用毛玻璃效果) -->
    <div class="row align-items-center bg-white-glass rounded-4 shadow-purple p-4 p-md-5">
      <!-- 左側 地圖區域 -->
<!-- 左側 地圖區域 -->
<div class="col-md-6 col-12 mb-4 mb-md-0">
  <!-- 加入 map-wrapper 並移除 iframe 內部的 width/height -->
  <div class="map-wrapper rounded shadow-sm overflow-hidden responsive-map">
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d59050.26968745105!2d114.15095807413078!3d22.32938069053403!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x34040063ac5bbdd5%3A0x42bdfb6bb033cf2b!2sApple%20ifc%20mall!5e0!3m2!1sen!2shk!4v1773997497555!5m2!1sen!2shk" 
      allowfullscreen="" 
      loading="lazy" 
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</div>


      <!-- 右側 地址資訊 -->
      <div class="col-md-6 col-12 ps-md-5">
        <div class="address-content">
          <h2 class="fw-bold text-dark mb-4">E-Shop Headquarters</h2>
          <div class="address-details text-muted lead">
            <p class="mb-2"><i class="fas fa-map-marker-alt text-primary mr-2"></i> 123 Nathan Road,</p>
            <p class="mb-4">Kowloon, Hong Kong</p>
            <p class="mb-2"><i class="fas fa-phone text-primary mr-2"></i> +852 1234 5678</p>
            <p><i class="fas fa-envelope text-primary mr-2"></i> contact@e-shop.com</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
    <!-- ==============store address ends here============== -->

    <!-- ==============footer starts here============== -->
    <div id="footer-placeholder"></div>
    <!-- ==============footer ends here============== -->


    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
        integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV"
        crossorigin="anonymous"></script>
</body>

</html>
